<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <link rel="stylesheet" href="style.css">
    <!-- <script src="app.js" defer></script> -->
    
        <!-- Character Encoding & Viewport -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
        <!-- SEO Tags -->
        <title>Custom Mechanical Keyboard | Premium Mechanical Gaming Keyboards</title>
        <meta name="description" content="Premium custom mechanical keyboard engineered for typists and gamers. Featuring hot-swappable switches, RGB lighting, and aluminum construction. Only $149.99.">
        <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1">
        <meta name="language" content="English">
        <meta name="author" content="Mechanical Keyboard Co.">
    
        <!-- Open Graph Tags -->
        <meta property="og:type" content="product">
        <meta property="og:title" content="Custom Mechanical Keyboard - Premium Quality">
        <meta property="og:description" content="Experience ultimate typing with our premium custom mechanical keyboard. Hot-swappable switches, RGB lighting, aluminum frame. $149.99.">
        <meta property="og:url" content="https://www.example.com/products/custom-mechanical-keyboard">
        <meta property="og:image" content="https://www.example.com/images/keyboard-hero.jpg">
        <meta property="og:image:width" content="1200">
        <meta property="og:image:height" content="630">
    
        <!-- Twitter Card Tags -->
        <meta name="twitter:card" content="summary_large_image">
        <meta name="twitter:title" content="Custom Mechanical Keyboard - Premium Quality">
        <meta name="twitter:description" content="Experience ultimate typing with our premium custom mechanical keyboard. Hot-swappable switches, RGB lighting, aluminum frame. $149.99.">
        <meta name="twitter:image" content="https://www.example.com/images/keyboard-hero.jpg">
        <meta name="twitter:creator" content="@mechanicalkeyboards">
    
        <!-- JSON-LD Structured Data (Product Schema) -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org/",
            "@type": "Product",
            "name": "Custom Mechanical Keyboard",
            "description": "Premium custom mechanical keyboard with hot-swappable switches, RGB lighting, and aluminum construction.",
            "image": "https://www.example.com/images/keyboard-hero.jpg",
            "brand": {
                "@type": "Brand",
                "name": "Mechanical Keyboard Co."
            },
            "offers": {
                "@type": "Offer",
                "url": "https://www.example.com/products/custom-mechanical-keyboard",
                "priceCurrency": "USD",
                "price": "149.99",
                "availability": "https://schema.org/InStock",
                "seller": {
                    "@type": "Organization",
                    "name": "Mechanical Keyboard Co."
                }
            },
            "aggregateRating": {
                "@type": "AggregateRating",
                "ratingValue": "4.8",
                "reviewCount": "128"
            }
        }
        </script>
</head>
<body>
    <section class="carousel-container">
        <div class="carousel-slides">
            <!-- slide 1 -->
            <div class="slide active">
                <img src="https://picsum.photos/id/10/800/600" alt="Mechanical Keyboard - Side View">
            </div>
            <div class="slide">
                <img src="https://picsum.photos/id/11/800/600" alt="Mechanical Keyboard - Backlit View">
            </div>
            <div class="slide">
                <img src="https://picsum.photos/id/12/800/600" alt="Mechanical Keyboard - Backlit View">
            </div>
        </div>
        <button class="carousel-btn prev-btn" id="prevBtn">&#10094;</button>
        <button class="carousel-btn next-btn" id="nextBtn">&#10095;</button>
        </section>
    <script src="app.js" defer></script>
</body>
</html>
